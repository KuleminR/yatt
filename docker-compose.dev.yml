services:
  db:
    image: postgres:18.1
    container_name: db
    shm_size: 128mb
    env_file: ".env"
    environment:
      POSTGRES_USER: yatt
      POSTGRES_PASSWORD: yatt
      POSTGRES_DB: yatt
    volumes:
      - ./postgres-data:/var/lib/postgresql
    ports:
      - 5432:5432
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: yatt@app.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: 1
      PGADMIN_LISTEN_PORT: 80
    ports:
      - 8080:80
